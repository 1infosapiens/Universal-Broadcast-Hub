kind = "web"
previewPath = "/"
title = "Universal Broadcasting University"
version = "1.0.0"
id = "artifacts/ubu-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24422

[services.development]
run = "pnpm --filter @workspace/ubu-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ubu-website", "run", "build" ]
publicDir = "artifacts/ubu-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24422"
BASE_PATH = "/"
