packages:
  "framer-motion": "For elegant page transitions and scroll animations fitting a premium university"
  "react-hook-form": "For robust contact and application forms"
  "@hookform/resolvers": "Zod validation integration for forms"
  "zod": "Schema validation for contact forms"

images:
