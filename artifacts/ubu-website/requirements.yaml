    description: "Majestic university campus building with classical architecture, sunset lighting, professional, ultra realistic, cinematic"
    aspect_ratio: "16:9"
  - path: "artifacts/ubu-website/public/images/creative-arts.png"
    description: "Abstract artistic studio with modeling runway and dramatic lighting, high fashion, elegant navy and gold tones"
    aspect_ratio: "16:9"
  - path: "artifacts/ubu-website/public/images/library-interior.png"
    description: "Grand university library interior with rows of books, glowing reading lamps, modern study areas, academic excellence"
    aspect_ratio: "16:9"
  - path: "artifacts/ubu-website/public/images/performance-stage.png"
    description: "Dramatic theatrical stage with spotlights and dancers in motion, professional theater, cinematic lighting"
    aspect_ratio: "16:9"
  - path: "artifacts/ubu-website/public/images/music-studio.png"
    description: "High-end music recording studio mixing board with golden accents, professional sound engineering, moody lighting"
    aspect_ratio: "16:9"
  - path: "artifacts/ubu-website/public/images/students-gathering.png"
